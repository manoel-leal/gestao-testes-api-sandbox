name: 'Execução Manual'

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  api-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Subir containers
        run: docker compose up -d

      - name: Aguardar banco de dados ficar pronto
        run: |
          until docker compose exec -T db pg_isready -U postgres; do
            echo "Aguardando Postgres..."
            sleep 2
          done

      - name: Rodar migrations
        run: docker compose exec -T app npx sequelize-cli db:migrate

      - name: Rodar seeds
        run: docker compose exec -T app npx sequelize-cli db:seed:all

      - name: Verificar containers
        run: docker ps

      - name: Instalar dependencias
        working-directory: test
        run: npm install

      - name: Executar testes de api
        working-directory: test
        run: npm test
        env:
          BASE_URL: http://localhost:3000
